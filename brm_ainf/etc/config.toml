[Proxies]
# Proxies for required interfaces
Lidad3D = "lidad3d:tcp -h localhost -p 0"
OmniRobot = "omnirobot:tcp -h localhost -p 0"


[Period]
Compute = 100
Emergency = 500

[Component.Debug]
Verbose = true

[Ice]
Warn.Connections = "0"
Trace.Network = "0"
Trace.Protocol = "0"
MessageSizeMax = "20004800"

[Lidar]
# Inverse variance of the SDF error. Higher means less noise.
Precision = 1.0
